# Nginx Configuration for NetMon
# Place this file in: /etc/nginx/sites-available/netmon
# Then: sudo ln -s /etc/nginx/sites-available/netmon /etc/nginx/sites-enabled/
# And: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name netmon.yourdomain.com;
    
    # Optional: Access control by IP
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;
    
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for long scans
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering settings
        proxy_buffering off;
        proxy_cache off;
    }
    
    # Optional: Basic authentication
    # auth_basic "NetMon Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    
    # Logging
    access_log /var/log/nginx/netmon_access.log;
    error_log /var/log/nginx/netmon_error.log;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

